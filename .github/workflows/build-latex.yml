name: Build LaTeX (XeLaTeX + Biber)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup TeX Live (basic-full)
        uses: dante-ev/texlive-action@v2
        with:
          scheme: full

      - name: Compile (latexmk, xelatex + biber)
        run: |
          sudo tlmgr install biber || true
          latexmk -pdf -pdflatex="xelatex -interaction=nonstopmode -shell-escape" -use-biber -f main.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: main.pdf
